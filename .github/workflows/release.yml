name: Release

# Builds installers on each OS and uploads them to a GitHub Release whenever a
# version tag (e.g. v0.2.0) is pushed. electron-builder creates/updates a DRAFT
# release for the tag and attaches the artifacts plus the latest*.yml update
# metadata; review and publish it from the GitHub Releases page.
#
# Usage:  git tag v0.2.0 && git push origin v0.2.0
# (Per Git Flow, tag the merge commit on `main`.)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # needed to create the release and upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # uiohook-napi (global push-to-talk hook) is compiled from source against
      # Electron's ABI by @electron/rebuild, and its libuiohook needs the X11
      # dev headers (e.g. X11/keysym.h). Bare ubuntu runners don't ship them.
      - name: Install Linux native build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxtst-dev libxt-dev libxinerama-dev libx11-xcb-dev libxkbcommon-dev libxkbcommon-x11-dev

      - run: npm ci

      - run: npm run build

      # electron-builder auto-detects the runner OS and produces that platform's
      # targets (Linux: AppImage+deb, Windows: NSIS, macOS: dmg). `--publish
      # always` uploads them to the draft GitHub Release for this tag.
      # Builds are UNSIGNED (no certs configured) — fine for personal releases;
      # add CSC_* / Apple notarization secrets here later to sign.
      - name: Package & publish
        run: npx --no-install electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
