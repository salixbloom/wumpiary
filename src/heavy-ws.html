<!doctype html>
<html>
  <head><meta charset="utf-8" /><title>heavy-ws</title></head>
  <body style="margin:0;background:#313338;color:#ddd;font-family:sans-serif">
    <div id="s">init</div>
    <script>
      // Gateway-like client: an always-on WebSocket with auto-reconnect/backoff.
      // The server pushes periodic frames; that incoming traffic is what may
      // exempt the page from Chromium's intensive background throttling.
      const port = new URLSearchParams(location.search).get('port');
      let ws = null, backoff = 500;

      function setState(state) {
        document.getElementById('s').textContent = state;
        // DOM 'message' events cross isolated worlds, so the preload observes this.
        window.postMessage({ __ws: true, state }, '*');
      }

      function connect() {
        setState('connecting');
        try { ws = new WebSocket('ws://127.0.0.1:' + port); } catch (e) { schedule(); return; }
        ws.onopen = () => { backoff = 500; setState('connected'); };
        ws.onmessage = () => { window.__lastMsg = Date.now(); }; // server keepalive
        ws.onclose = () => { setState('reconnecting'); schedule(); };
        ws.onerror = () => { try { ws.close(); } catch (e) {} };
      }
      function schedule() { setTimeout(connect, backoff); backoff = Math.min(backoff * 2, 8000); }
      connect();

      // Client-side keepalive send (throttle-sensitive — that's intentional).
      setInterval(() => { try { if (ws && ws.readyState === 1) ws.send('hb'); } catch (e) {} }, 5000);

      // ~20MB retained heap to imitate a loaded client.
      window.__ballast = new Uint8Array(20 * 1024 * 1024).fill(7);
    </script>
  </body>
</html>
